<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" role="img" aria-label="TeamLease Digivarsity">
  <!-- TeamLease wordmark with smile glyph -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <!-- Smile/eyes glyph: ( : ) -->
    <g fill="#1f3a8a">
      <!-- Left paren -->
      <path d="M40 50 q-22 30 0 60 l4 -3 q-18 -27 0 -54 z"/>
      <!-- Two dots (eyes) -->
      <circle cx="62" cy="70" r="4.5"/>
      <circle cx="62" cy="92" r="4.5"/>
      <!-- Right paren -->
      <path d="M86 50 q22 30 0 60 l-4 -3 q18 -27 0 -54 z"/>
    </g>

    <!-- TeamLease text -->
    <text x="110" y="100" font-size="62" font-weight="300" fill="#1f3a8a" letter-spacing="-1">TeamLease</text>
  </g>

  <!-- Divider -->
  <line x1="408" y1="34" x2="408" y2="126" stroke="#94a3b8" stroke-width="1.4"/>

  <!-- Digivarsity lockup -->
  <g font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <!-- Colorful icon (overlapping geometric shapes) -->
    <g transform="translate(440, 30)">
      <!-- Red top -->
      <path d="M28 0 a28 28 0 0 1 28 28 l-28 0 z" fill="#e63946"/>
      <!-- Blue right -->
      <path d="M56 28 a28 28 0 0 1 -28 28 l0 -28 z" fill="#1f6fd1"/>
      <!-- Green bottom-left arc -->
      <path d="M0 28 a28 28 0 0 0 28 28 l0 -28 z" fill="#2a9d8f"/>
    </g>

    <!-- Digivarsity text -->
    <text x="514" y="100" font-size="58" font-weight="700" fill="#1f6fd1" letter-spacing="-1">Digivarsity</text>
  </g>
</svg>
